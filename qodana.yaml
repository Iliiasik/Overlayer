####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: '1.0'
linter: qodana-js
profile:
  path: .qodana/profile.yaml
bootstrap: npm ci && npx wxt prepare
include:
  - name: CheckDependencyLicenses
  - name: JsCoverageInspection
exclude:
  - name: All
    paths:
      - .output
      - .wxt
      - coverage
failureConditions:
  severityThresholds:
    critical: 0
